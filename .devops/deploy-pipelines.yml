# Azure DevOps pipeline to release a new version and deploy to production.

parameters:
  - name: 'RELEASE_SEMVER'
    displayName: 'When packing a release, define the version bump to apply'
    type: string
    values:
      - major
      - minor
      - patch
      - skip
    default: skip
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values:
      - dev
      - uat
  - name: DEPLOY_TYPE
    displayName: Deployment type
    type: string
    default: production_slot
    values:
#      - staging_slot_and_swap
      - production_slot
  - name: "FORCE_REPLACE_DOCKER_IMAGE"
    displayName: "Force the existing docker image to be replaced (latest tag)"
    type: boolean
    default: False
    values:
      - False
      - True

# Only manual activations are intended
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-22.04'

# variables set on azdevops to avoid circular dependency warning
# $(DEFAULT_BRANCH)
# $(HEALTHCHECK_CONTAINER_SUBNET)
# $(HEALTHCHECK_ENDPOINT)
variables:
  ${{ if eq(parameters['environment'], 'dev') }}:
    AZURE_SUBSCRIPTION: $(DEV_AZURE_SUBSCRIPTION)
    WEB_APP_NAME: $(DEV_WEB_APP_NAME)
    WEB_APP_RESOURCE_GROUP_NAME: $(DEV_WEB_APP_RESOURCE_GROUP_NAME)
    HEALTHCHECK_CONTAINER_RESOURCE_GROUP_NAME: $(DEV_HEALTHCHECK_CONTAINER_RESOURCE_GROUP_NAME)
    HEALTHCHECK_CONTAINER_VNET: $(DEV_HEALTHCHECK_CONTAINER_VNET)

  ${{ if eq(parameters['environment'], 'uat') }}:
    AZURE_SUBSCRIPTION: $(UAT_AZURE_SUBSCRIPTION)
    WEB_APP_NAME: $(UAT_WEB_APP_NAME)
    WEB_APP_RESOURCE_GROUP_NAME: $(UAT_WEB_APP_RESOURCE_GROUP_NAME)
    HEALTHCHECK_CONTAINER_RESOURCE_GROUP_NAME: $(UAT_HEALTHCHECK_CONTAINER_RESOURCE_GROUP_NAME)
    HEALTHCHECK_CONTAINER_VNET: $(UAT_HEALTHCHECK_CONTAINER_VNET)

  ${{ if eq(variables['Build.SourceBranchName'], 'merge') }}:
    SOURCE_BRANCH: "main" # force to main branch
  ${{ if ne(variables['Build.SourceBranchName'], 'merge') }}:
    SOURCE_BRANCH: ${{ variables['Build.SourceBranchName'] }}

resources:
  repositories:
    - repository: pagopaCommons
      type: github
      name: pagopa/azure-pipeline-templates
      ref: refs/tags/v15
      endpoint: 'io-azure-devops-github-ro'

stages:
  - stage: EchoDbg

    jobs:
      - job: Print
        steps:
          - script: |
              echo "Debug..."
              echo ${{ parameters.RELEASE_SEMVER }}
              echo ${{ variables['Build.SourceBranch'] }}
              echo ${{ variables.DEFAULT_BRANCH }} 
              echo $(DEFAULT_BRANCH)
            displayName: 'Print info'

  # Create a release
  # Only executed when RELEASE_SEMVER is not 'skip'

  - ${{ if ne(parameters.RELEASE_SEMVER, 'skip') }}:
    - stage: Release
      jobs:
        - job: releaseService
          steps:
            - template: templates/node-job-setup/template.yaml@pagopaCommons
              parameters:
                persistCredentials: true
            - template: templates/node-github-release/template.yaml@pagopaCommons
              parameters:
                release_branch: ${{ replace(replace(variables['Build.SourceBranch'], 'refs/tags/', ''), 'refs/heads/', '') }}
                semver: '${{ parameters.RELEASE_SEMVER }}'
                gitEmail: '$(GIT_EMAIL)'
                gitUsername: '$(GIT_USERNAME)'
                gitHubConnection: '$(GITHUB_CONNECTION)'

  # Prepare Artifact
  # Only executed when RELEASE_SEMVER is not 'skip'
  - ${{ if or(ne(parameters.RELEASE_SEMVER, 'skip'), eq(parameters.FORCE_REPLACE_DOCKER_IMAGE, true)) }}:
    - stage: Prepare_artifact

      jobs:
        - job: 'prepare_artifact'
          steps:
            # Build application
            - template: templates/node-job-setup/template.yaml@pagopaCommons
              parameters:
                # On the assumption that this stage is executed only when Release stage is,
                #  with this parameter we set the reference the deployment script must pull changes from.
                # The branch/tag name is calculated from the source branch
                #  ex: Build.SourceBranch=refs/heads/master --> master
                #  ex: Build.SourceBranch=refs/tags/v1.2.3-RELEASE --> v1.2.3-RELEASE
                gitReference: ${{ replace(replace(variables['Build.SourceBranch'], 'refs/tags/', ''), 'refs/heads/', '') }}
            - script: |
                yarn build
              displayName: 'Build'

            # Copy application to
            - task: CopyFiles@2
              inputs:
                SourceFolder: '$(System.DefaultWorkingDirectory)'
                TargetFolder: '$(System.DefaultWorkingDirectory)/bundle'
                Contents: |
                  **/*
                  web.config
                  !.git/**/*
                  !**/*.js.map
                  !**/*.ts
                  !.vscode/**/*
                  !.devops/**/*
                  !.prettierrc
                  !.gitignore
                  !README.md
                  !jest.integration.js
                  !test
                  !tsconfig.json
                  !tslint.json
                  !yarn.lock
                  !Dangerfile.js
                  !CODEOWNERS
                  !Dockerfile
                  !preview.hbs
                  !.auto-changelog.json
                  !api_pagopa.yaml
                  !__*/**/*
              displayName: 'Copy deploy files'

            - publish: $(System.DefaultWorkingDirectory)/bundle
              artifact: Bundle

  # Deploy
  # Always executed
  - stage: 'Deploy_to_${{ parameters.environment }}'
    ${{ if or(ne(parameters.RELEASE_SEMVER, 'skip'), eq(parameters.FORCE_REPLACE_DOCKER_IMAGE, true)) }}:
      dependsOn:
        - Prepare_artifact
    jobs:
      - job: 'do_deploy_staging_slot_and_swap'
        condition: eq('${{ parameters.DEPLOY_TYPE }}', 'staging_slot_and_swap')
        steps:
          - checkout: none
          - download: current
            artifact: Bundle

          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              resourceGroupName: '$(WEB_APP_RESOURCE_GROUP_NAME)'
              appType: 'webApp'
              appName: '$(WEB_APP_NAME)'
              package: '$(Pipeline.Workspace)/Bundle'
              deploymentMethod: 'auto'
              deployToSlotOrASE: true
              slotName: 'staging'
            displayName: 'Deploy to staging slot'

          # - template: templates/rest-healthcheck/template.yaml@pagopaCommons
          #   parameters:
          #     azureSubscription: "$(AZURE_SUBSCRIPTION)"
          #     appName: "$(WEB_APP_NAME)"
          #     endpoint: "$(HEALTHCHECK_ENDPOINT)"
          #     endpointType: "public"
          #     containerInstanceResourceGroup: ""
          #     containerInstanceVNet: ""
          #     containerInstanceSubnet: ""

          - task: AzureAppServiceManage@0
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              resourceGroupName: '$(WEB_APP_RESOURCE_GROUP_NAME)'
              appName: '$(WEB_APP_NAME)'
              sourceSlot: 'staging'
              swapWithProduction: true
            displayName: 'Swap with production slot'

      - job: 'do_deploy_production_slot'
        condition: eq('${{ parameters.DEPLOY_TYPE }}', 'production_slot')
        steps:
          - checkout: none
          - download: current
            artifact: Bundle

          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              resourceGroupName: '$(WEB_APP_RESOURCE_GROUP_NAME)'
              appType: 'webApp'
              appName: '$(WEB_APP_NAME)'
              package: '$(Pipeline.Workspace)/Bundle'
              deploymentMethod: 'auto'
              deployToSlotOrASE: true
              slotName: 'production'
            displayName: 'Deploy to production slot'

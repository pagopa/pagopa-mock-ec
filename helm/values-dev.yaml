microservice-chart: &microservice-chart
  namespace: "mock"
  nameOverride: ""
  fullnameOverride: ""
  terminationGracePeriodSeconds: 140
  critical: false
  image:
    #    repository: pagopadcommonacr.azurecr.io/pagopamockec
    repository: ghcr.io/pagopa/pagopa-mock-ec
    tag: "1.7.5"
    pullPolicy: Always
  readinessProbe:
    handlerType: tcpSocket
    tcpSocket:
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 10
  livenessProbe:
    handlerType: tcpSocket
    tcpSocket:
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 20
  deployment:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
  #  serviceMonitor:
  #    create: true
  #    endpoints:
  #      - interval: 5s
  #        targetPort: 8080
  #        path: /q/metrics

  ports:
    - 8080
  service:
    type: ClusterIP
    ports:
      - 8080
  ingress: &ingress
    create: true
    host: "weudev.mock.internal.dev.platform.pagopa.it"
    path: /pagopa-mock-ec-service/(.*)
    servicePort: 8080
  serviceAccount:
    name: "mock-workload-identity"
  azure:
    workloadIdentityClientId: <workload-identity-client-id-set-automatically-by-gha>
  podAnnotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - all
  resources:
    requests:
      memory: "200Mi"
      cpu: "300m"
    limits:
      memory: "512Mi"
      cpu: "400m"
  autoscaling:
    enable: false
    #    minReplica: 1
    #    maxReplica: 1
    #    pollingInterval: 10 # seconds
    #    cooldownPeriod: 50 # seconds
    #    triggers:
    #      - type: cpu
    #        metadata:
    #          type: Utilization
    #          value: "75"
    #      - type: memory
    #        metadata:
    #          type: Utilization
    #          value: "75"
  envConfig: &envConfig
    TIMEOUT_DELAY: "5000"
    PPT_NODO: "/mock"
    PORT: "8080"
    CC_BANK_PRIMARY_EC: "IT96R0123454321000000012345"
    CC_BANK_SECONDARY_EC: "IT04O0100003245350008332100"
    TEST_DEBUG: "Y"
    AUX_DIGIT: "3"
  envFieldRef:
    APP_NAME: "metadata.labels['app.kubernetes.io/instance']"
    APP_VERSION: "metadata.labels['app.kubernetes.io/version']"
  envSecret:
    OTEL_EXPORTER_OTLP_HEADERS: "elastic-apm-secret-token"
  keyvault:
    name: "pagopa-d-mock-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node_type
                operator: In
                values:
                  - 'user'
  canaryDelivery:
    create: false
mock-ec-primary:
  !!merge <<: *microservice-chart
  fullnameOverride: "mock-ec-primary"
  ingress:
    !!merge <<: *ingress
    path: /mock-ec-primary(/|$)(.*)
    pathType: ImplementationSpecific
    servicePort: 8080
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "130"
    proxyBodySize: 100m
    rewriteTarget: /$2
mock-ec-secondary:
  !!merge <<: *microservice-chart
  fullnameOverride: "mock-ec-secondary"
  ingress:
    !!merge <<: *ingress
    path: /mock-ec-secondary(/|$)(.*)
    pathType: ImplementationSpecific
    servicePort: 8080
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "130"
    proxyBodySize: 100m
    rewriteTarget: /$2
